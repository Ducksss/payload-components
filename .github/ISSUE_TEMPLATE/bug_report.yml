name: Bug Report
description: Report something broken in the site, registry, CLI, or Payload integration.
title: '[bug] '
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. Please include enough detail for us to reproduce the issue without guessing about your Payload or Next.js setup.

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Payload CMS config or admin
        - Frontend site
        - Component gallery
        - Registry files
        - payload-components CLI
        - Documentation
        - CI or release checks
        - Other
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the issue and what you expected instead.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run ...
        2. Open ...
        3. See ...
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include OS, Node, pnpm, Payload, Next.js, database, and browser versions when relevant.
      placeholder: |
        OS:
        Node:
        pnpm:
        Payload:
        Next.js:
        Database:

  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      render: shell
