version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      payload:
        patterns:
          - '@payloadcms/*'
          - payload
      next-react:
        patterns:
          - next
          - react
          - react-dom
      test-tooling:
        patterns:
          - '@playwright/*'
          - vitest
          - '@testing-library/*'

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
