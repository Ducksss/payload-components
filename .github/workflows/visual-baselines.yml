name: Visual Baselines

# Mints the per-platform Playwright visual baselines for the components-visual
# suite. CI runs on linux, so the committed darwin baselines silently skip there
# (a baseline must be generated in the renderer it is compared against). Run this
# workflow on a branch to generate the linux `*-chromium-linux.png` baselines in
# the same environment the release gate uses, then merge the PR it opens so the
# 38-component visual suite actually compares on every subsequent gate run.

on:
  workflow_dispatch:
    inputs:
      spec:
        description: 'Playwright spec filter to (re)generate baselines for'
        required: false
        default: 'components-visual'
        type: string

env:
  NEXT_TELEMETRY_DISABLED: '1'

permissions:
  contents: write
  pull-requests: write

jobs:
  mint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: 10.24.0

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm exec playwright install --with-deps chromium

      - run: pnpm source:build

      - name: Update visual baselines
        run: pnpm test:e2e ${{ inputs.spec }} --update-snapshots

      - name: Open PR with minted baselines
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          snapshots=tests/e2e
          if [[ -z "$(git status --porcelain "$snapshots")" ]]; then
            echo "No baseline changes — nothing to commit."
            exit 0
          fi
          branch="visual-baselines/${GITHUB_REF_NAME//\//-}-${GITHUB_RUN_ID}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$branch"
          git add "$snapshots"
          git commit -m "test(chore): mint ${RUNNER_OS} visual baselines (${{ inputs.spec }})"
          git push origin "$branch"
          gh pr create \
            --base "$GITHUB_REF_NAME" \
            --head "$branch" \
            --title "test(chore): mint ${RUNNER_OS} visual baselines" \
            --body "Auto-generated by the \`visual-baselines\` workflow. Commits the per-platform \`${{ inputs.spec }}\` snapshot baselines so the visual-regression suite compares (instead of skipping) on the CI gate."

      - name: Upload baselines artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-baselines
          path: tests/e2e/**/*-snapshots/**
          if-no-files-found: ignore
