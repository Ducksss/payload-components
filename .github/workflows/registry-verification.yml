name: Registry Verification

on:
  pull_request:
  push:
    branches:
      - dev
      - main
  schedule:
    - cron: '18 19 * * *'
  workflow_dispatch:
    inputs:
      registry_url:
        description: 'Optional deployed registry URL template, e.g. https://example.com/r/{name}.json'
        required: false
        type: string

env:
  NEXT_TELEMETRY_DISABLED: '1'

jobs:
  release-gate:
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version:
          - 20.19.0
          - 22
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10.24.0

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm exec playwright install --with-deps chromium

      - name: Release verification
        shell: bash
        run: |
          set -o pipefail
          pnpm test:release 2>&1 | tee payload-components-release.log

      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: release-gate-artifacts
          path: |
            payload-components-release.log
            playwright-report
            test-results
          if-no-files-found: ignore

  pr-gate:
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: release-gate
    steps:
      - run: echo "release gate passed"

  fresh-payload-smoke:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: payload_components
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      CRON_SECRET: ci-cron-secret
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/payload_components
      NEXT_PUBLIC_SERVER_URL: http://localhost:3000
      PAYLOAD_SECRET: ci-payload-secret
      POSTGRES_URL: postgresql://postgres:postgres@127.0.0.1:5432/payload_components
      PREVIEW_SECRET: ci-preview-secret
      REGISTRY_URL: ${{ github.event.inputs.registry_url || '' }}
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10.24.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm exec playwright install --with-deps chromium

      - name: Fresh Payload target smoke
        shell: bash
        run: |
          set -o pipefail
          if [ -n "$REGISTRY_URL" ]; then
            pnpm test:fresh -- --registry-url "$REGISTRY_URL" --keep-temp 2>&1 | tee payload-components-fresh.log
          else
            pnpm test:fresh -- --keep-temp 2>&1 | tee payload-components-fresh.log
          fi

      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: fresh-payload-artifacts
          path: |
            payload-components-fresh.log
            playwright-report
            test-results
            /tmp/payload-components-fresh-smoke-*
          if-no-files-found: ignore
